<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>봉사처 추천</title>
  <meta name="description" content="예/아니오 질문으로 지역과 선호 활동을 좁혀 개인 자격 봉사처를 추천하는 화면" />
  <style>
    :root {
      --bg: #f4f7fb;
      --bg-2: #eef3fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #e5e7eb;
      --line-2: #dbe4f0;
      --accent: #2563eb;
      --accent-2: #1d4ed8;
      --accent-soft: #e8f0ff;
      --good: #0f766e;
      --good-soft: #ecfdf5;
      --dark: #0f172a;
      --chip: #f8fafc;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      --radius: 24px;
      --radius-sm: 16px;
      --maxw: 1080px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top, #ffffff 0%, var(--bg) 45%, #eef2f8 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
    }

    body {
      min-height: 100vh;
    }

    a {
      color: var(--accent-2);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .wrap {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 22px 14px 56px;
    }

    .hero {
      padding: 28px 24px 24px;
      border: 1px solid var(--line);
      border-radius: 32px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.92)),
        linear-gradient(135deg, #f8fbff, #eef4ff 60%, #fdfefe);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line-2);
      background: rgba(255,255,255,0.88);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .badge.primary {
      background: var(--accent-soft);
      border-color: #cfe0ff;
      color: var(--accent-2);
    }

    .badge.good {
      background: var(--good-soft);
      border-color: #cfeee3;
      color: var(--good);
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 7vw, 68px);
      line-height: 1.04;
      letter-spacing: -0.04em;
      font-weight: 800;
      color: #0f172a;
    }

    .hero-sub {
      margin-top: 16px;
      max-width: 820px;
      font-size: clamp(16px, 2.35vw, 22px);
      line-height: 1.7;
      color: #506075;
      letter-spacing: -0.02em;
    }

    .panel {
      background: rgba(255,255,255,0.96);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      margin-bottom: 16px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--good-soft);
      border: 1px solid #cfeee3;
      color: var(--good);
      font-size: 14px;
      font-weight: 700;
    }

    .question-title {
      margin: 0;
      font-size: clamp(27px, 4vw, 44px);
      line-height: 1.28;
      font-weight: 800;
      letter-spacing: -0.035em;
      color: #0f172a;
    }

    .small {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .meta-row {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .chip {
      font-size: 13px;
      line-height: 1.2;
      padding: 9px 12px;
      border-radius: 999px;
      background: var(--chip);
      color: #3c4c60;
      border: 1px solid #e6ebf2;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chip.accent {
      background: var(--accent-soft);
      color: var(--accent-2);
      border-color: #d8e5ff;
      font-weight: 700;
    }

    .path {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .path-item {
      font-size: 12px;
      color: #6b7280;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px dashed #d3dae6;
      background: #fff;
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 17px 18px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      cursor: pointer;
      transition: transform .08s ease, opacity .2s ease, background .2s ease, filter .2s ease;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.05);
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(0.99);
    }

    button:disabled {
      opacity: .55;
      cursor: default;
      transform: none;
      filter: none;
    }

    .btn-yes {
      background: linear-gradient(180deg, #2d7bf0, #2563eb);
      color: white;
    }

    .btn-no {
      background: linear-gradient(180deg, #0f172a, #111827);
      color: white;
    }

    .btn-sub {
      background: #eff3f8;
      color: #111827;
      box-shadow: none;
      font-size: 18px;
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .stack {
      display: grid;
      gap: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      background: #fff;
      min-width: 0;
    }

    .card h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.45;
      letter-spacing: -0.02em;
      color: #111827;
      word-break: keep-all;
    }

    .card p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
      word-break: keep-all;
    }

    .card .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .link-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid #dbe5f5;
      background: #f8fbff;
      color: var(--accent-2);
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    .link-button.secondary {
      background: #fff;
      color: #344054;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 19px;
      line-height: 1.35;
      letter-spacing: -0.02em;
      color: #111827;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 24px 12px;
      border: 1px dashed #d8dee9;
      border-radius: 16px;
      background: #fafcff;
    }

    .footer-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.75;
      padding: 6px 2px 0;
      text-align: center;
    }

    .hidden {
      display: none !important;
    }

    .result-animate {
      animation: panel-lift .72s cubic-bezier(.2, .8, .2, 1);
      transform-origin: center bottom;
      will-change: transform, opacity, box-shadow;
    }

    .result-highlight {
      box-shadow: 0 22px 48px rgba(37, 99, 235, 0.18), var(--shadow);
    }

    .result-burst {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 30;
    }

    .float-emoji,
    .float-card {
      position: absolute;
      left: 50%;
      bottom: 8vh;
      opacity: 0;
      transform: translate3d(0, 18px, 0) scale(.88);
      will-change: transform, opacity;
      animation: burst-float var(--dur, 1300ms) cubic-bezier(.18, .8, .24, 1) forwards;
      animation-delay: var(--delay, 0ms);
      filter: drop-shadow(0 10px 18px rgba(15, 23, 42, .10));
    }

    .float-emoji {
      font-size: var(--size, 28px);
      line-height: 1;
    }

    .float-card {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(207, 224, 255, 0.95);
      color: var(--accent-2);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -0.02em;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    @keyframes burst-float {
      0% {
        opacity: 0;
        transform: translate3d(calc(var(--x, 0px) * .15), 22px, 0) scale(.85) rotate(calc(var(--rot, 0deg) * .45));
      }
      12% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate3d(var(--x, 0px), calc(-1 * var(--y, 220px)), 0) scale(1.08) rotate(var(--rot, 0deg));
      }
    }

    @keyframes panel-lift {
      0% {
        opacity: .3;
        transform: translateY(24px) scale(.985);
      }
      55% {
        opacity: 1;
        transform: translateY(-4px) scale(1.005);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .result-animate,
      .float-emoji,
      .float-card {
        animation: none !important;
      }
    }


    @media (max-width: 820px) {
      .grid, .button-row {
        grid-template-columns: 1fr;
      }

      .wrap {
        padding: 14px 12px 40px;
      }

      .hero {
        padding: 22px 18px;
        border-radius: 24px;
      }

      .panel {
        padding: 18px;
      }

      button {
        font-size: 20px;
      }
    }
  </style>
</head>

    }

    function makeChip(text, accent = false) {
      const span = document.createElement('span');
      span.className = accent ? 'chip accent' : 'chip';
      span.textContent = text;
      return span;
    }

    function labelRegion(value) {
      const map = {
        seoul_west: '서울 서부권',
        seoul_east_central: '서울 동부·중심·강남권',
        suwon_nearby: '수원·용인·화성·오산권',
        pangyo_seongnam: '성남·판교·분당권',
        geoje_gyeongnam: '거제·통영·창원 등 경남권',
        national_other: '전국 기타'
      };
      return map[value] || value;
    }

    function labelRegularity(value) {
      const map = {
        program_based: '프로그램형',
        regular_or_seasonal: '정기/계절형',
        regular_or_project: '정기/프로젝트형',
        regular_or_event: '정기/이벤트형',
        flexible: '유연형',
        regular_required: '정기 필수',
        seasonal: '계절형',
        direct_or_notice: '직접신청/공지확인',
        direct_or_platform: '직접신청/플랫폼병행',
        project_or_event: '프로젝트/이벤트형',
        regular_or_short: '정기/단기형',
        seasonal_cohort: '시즌·기수형',
        cohort_regular: '기수/정기형',
        regular_preferred: '정기 선호',
        periodic_opening: '수시 공고형',
        registered_or_irregular: '등록단체/비정기'
      };
      return map[value] || value;
    }

    function labelContact(value) {
      const map = {
        direct: '직접 대면',
        direct_or_platform: '직접/플랫폼 병행',
        direct_or_notice: '직접/공지 확인',
        indoor: '실내 중심',
        outdoor: '야외 중심',
        indirect_or_quiet: '비대면·조용한 실내형'
      };
      return map[value] || value;
    }

    function labelReligion(value) {
      if (value === true) return '종교연계 가능';
      if (value === false) return '종교색채 없음';
      if (typeof value === 'string' && value.trim()) return value;
      return '';
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function renderPath() {
      els.path.innerHTML = '';
      if (!state.history.length) return;

      state.history.forEach((step, idx) => {
        const item = document.createElement('span');
        item.className = 'path-item';
        const answerText = step.answer === 'yes' ? '예' : '아니오';
        item.textContent = `${idx + 1}. ${answerText}`;
        item.title = step.text;
        els.path.appendChild(item);
      });
    }

    function renderCandidates(node) {
      els.candidateChips.innerHTML = '';
      const ids = node.candidateIds || [];
      els.candidateChips.appendChild(makeChip(`현재 후보 ${ids.length}개`, true));

      const preview = ids.slice(0, 6)
        .map(id => getEntity(id)?.name)
        .filter(Boolean);

      preview.forEach(name => els.candidateChips.appendChild(makeChip(name)));
      if (ids.length > 6) {
        els.candidateChips.appendChild(makeChip(`외 ${ids.length - 6}개`));
      }
    }

    function createEntityCard(id, emphasis) {
      const entity = getEntity(id);
      if (!entity) return null;

      const div = document.createElement('article');
      div.className = 'card';

      const title = document.createElement('h3');
      title.textContent = entity.name;
      div.appendChild(title);

      const p = document.createElement('p');
      p.textContent = entity.summary || '설명 없음';
      div.appendChild(p);

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.appendChild(makeChip(emphasis, true));

      (entity.regionBuckets || []).forEach(x => meta.appendChild(makeChip(`권역: ${labelRegion(x)}`)));
      (entity.themes || []).slice(0, 4).forEach(x => meta.appendChild(makeChip(x)));

      const religion = labelReligion(entity.religiousTone);
      if (religion) meta.appendChild(makeChip(religion));

      if (entity.regularity) meta.appendChild(makeChip(`참여형태: ${labelRegularity(entity.regularity)}`));
      if (entity.contactStyle) meta.appendChild(makeChip(`방식: ${labelContact(entity.contactStyle)}`));

      div.appendChild(meta);

      const actionRow = document.createElement('div');
      actionRow.className = 'card-actions';

      if (entity.officialUrl) {
        const a = document.createElement('a');
        a.href = entity.officialUrl;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.className = 'link-button';
        a.textContent = '기관/안내 보기';
        actionRow.appendChild(a);
      }

      if (entity.applyUrl) {
        const a2 = document.createElement('a');
        a2.href = entity.applyUrl;
        a2.target = '_blank';
        a2.rel = 'noopener noreferrer';
        a2.className = 'link-button secondary';
        a2.textContent = '신청/공고 보기';
        actionRow.appendChild(a2);
      }

      div.appendChild(actionRow);
      return div;
    }

    function renderQuestion(node) {
      cleanupCelebration();
      els.statusBadge.textContent = '추천 진행 중';
      els.questionText.textContent = node.text;
      const depth = state.history.length + 1;
      const candidateCount = (node.candidateIds || []).length;
      els.questionMeta.textContent = `질문 ${depth} · 현재 남아 있는 후보 ${candidateCount}개`;
      renderCandidates(node);
      renderPath();
      els.answerButtons.classList.remove('hidden');
      els.backBtn.disabled = state.history.length === 0;
      els.resultPanel.classList.add('hidden');
      els.resultPanel.innerHTML = '';
    }


    function isIOS() {
      const ua = navigator.userAgent || navigator.vendor || window.opera || '';
      return /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    }

    function prefersReducedMotion() {
      return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    }

    function stopAndroidVibration() {
      if (vibrationLoopId) {
        clearInterval(vibrationLoopId);
        vibrationLoopId = null;
      }
      if (vibrationStopId) {
        clearTimeout(vibrationStopId);
        vibrationStopId = null;
      }
      if ('vibrate' in navigator && typeof navigator.vibrate === 'function') {
        try {
          navigator.vibrate(0);
        } catch (err) {
          console.debug('Vibration stop skipped:', err);
        }
      }
    }

    function triggerAndroidVibration(durationMs = 2200) {
      stopAndroidVibration();
      if (isIOS() || prefersReducedMotion()) return;
      if (!('vibrate' in navigator) || typeof navigator.vibrate !== 'function') return;

      const pattern = [160, 70, 190, 70, 240, 90, 260, 90];
      const cycleMs = pattern.reduce((sum, n) => sum + n, 0);

      try {
        const accepted = navigator.vibrate(pattern);
        if (accepted === false) return;

        vibrationLoopId = window.setInterval(() => {
          try {
            navigator.vibrate(pattern);
          } catch (err) {
            stopAndroidVibration();
          }
        }, Math.max(400, cycleMs - 40));

        vibrationStopId = window.setTimeout(stopAndroidVibration, durationMs);
      } catch (err) {
        console.debug('Vibration skipped:', err);
      }
    }

    function clearResultBurst() {
      if (burstCleanupId) {
        clearTimeout(burstCleanupId);
        burstCleanupId = null;
      }
      if (els.resultBurst) {
        els.resultBurst.innerHTML = '';
      }
    }

    function spawnResultBurst() {
      if (!els.resultBurst || prefersReducedMotion()) return;
      clearResultBurst();

      const emojiList = ['💙', '✨', '🎉', '🙌', '📍', '🤝'];
      const cardList = [
        { icon: '💙', text: '추천 완료' },
        { icon: '✨', text: '맞춤 결과' },
        { icon: '📌', text: '봉사처 발견' }
      ];

      for (let i = 0; i < 9; i += 1) {
        const node = document.createElement('span');
        node.className = 'float-emoji';
        node.textContent = emojiList[i % emojiList.length];
        node.style.setProperty('--x', `${(Math.random() * 300 - 150).toFixed(0)}px`);
        node.style.setProperty('--y', `${(190 + Math.random() * 170).toFixed(0)}px`);
        node.style.setProperty('--rot', `${(Math.random() * 30 - 15).toFixed(1)}deg`);
        node.style.setProperty('--size', `${26 + Math.random() * 10}px`);
        node.style.setProperty('--delay', `${Math.random() * 220}ms`);
        node.style.setProperty('--dur', `${1180 + Math.random() * 520}ms`);
        els.resultBurst.appendChild(node);
      }

      for (let i = 0; i < 3; i += 1) {
        const node = document.createElement('span');
        node.className = 'float-card';
        const picked = cardList[i % cardList.length];
        node.innerHTML = `<span>${picked.icon}</span><span>${picked.text}</span>`;
        node.style.setProperty('--x', `${(-120 + i * 120 + Math.random() * 40).toFixed(0)}px`);
        node.style.setProperty('--y', `${(220 + Math.random() * 120).toFixed(0)}px`);
        node.style.setProperty('--rot', `${(Math.random() * 16 - 8).toFixed(1)}deg`);
        node.style.setProperty('--delay', `${80 + i * 90}ms`);
        node.style.setProperty('--dur', `${1480 + Math.random() * 420}ms`);
        els.resultBurst.appendChild(node);
      }

      burstCleanupId = window.setTimeout(clearResultBurst, 2200);
    }

    function triggerResultAnimation() {
      const cards = [els.appPanel, els.resultPanel].filter(Boolean);
      cards.forEach(el => {
        el.classList.remove('result-animate', 'result-highlight');
        void el.offsetWidth;
        el.classList.add('result-animate', 'result-highlight');
      });
      setTimeout(() => {
        cards.forEach(el => el.classList.remove('result-highlight'));
      }, 950);
      spawnResultBurst();
    }

    function cleanupCelebration() {
      stopAndroidVibration();
      clearResultBurst();
      [els.appPanel, els.resultPanel].filter(Boolean).forEach(el => {
        el.classList.remove('result-animate', 'result-highlight');
      });
    }

    function celebrateResult() {
      triggerAndroidVibration();
      triggerResultAnimation();
    }

    function renderResult(resultId) {
      const result = state.data.results[resultId];
      els.resultPanel.classList.remove('hidden');
      els.resultPanel.innerHTML = '';
      els.statusBadge.textContent = '추천 결과';
      celebrateResult();

      const header = document.createElement('section');
      header.className = 'panel';
      header.innerHTML = `
        <div class="panel-head">
          <div class="eyebrow">결과 요약</div>
          <div class="status">추천 결과</div>
        </div>
        <h2 class="question-title">${escapeHtml(result.title)}</h2>
        <div class="small" style="margin-top:10px;">${escapeHtml(result.description || '')}</div>
      `;
      els.resultPanel.appendChild(header);

      const sections = [
        ['우선 추천', result.primaryIds || []],
        ['보조 추천', result.secondaryIds || []],
        ['실시간 탐색/대체 경로', result.fallbackIds || []]
      ];

      sections.forEach(([label, ids]) => {
        if (!ids.length) return;

        const section = document.createElement('section');
        section.className = 'panel';

        const title = document.createElement('h3');
        title.className = 'section-title';
        title.textContent = label;
        section.appendChild(title);

        const grid = document.createElement('div');
        grid.className = 'grid';

        ids.forEach(id => {
          const card = createEntityCard(id, label);
          if (card) grid.appendChild(card);
        });

        if (!grid.children.length) {
          const empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = '표시할 항목이 없습니다.';
          section.appendChild(empty);
        } else {
          section.appendChild(grid);
        }

        els.resultPanel.appendChild(section);
      });

      const actions = document.createElement('section');
      actions.className = 'panel';
      actions.innerHTML = `
        <div class="small">다른 조건으로 다시 보고 싶다면 이전 질문으로 돌아가거나 처음부터 다시 시작하면 됩니다.</div>
        <div class="actions">
          <button class="btn-sub" type="button" onclick="goBack()">이전 질문</button>
          <button class="btn-sub" type="button" onclick="restart()">처음부터</button>
        </div>
      `;
      els.resultPanel.appendChild(actions);
    }

    function answer(choice) {
      const node = state.data.nodes[state.currentId];
      const nextId = choice === 'yes' ? node.yes : node.no;
      if (!nextId) return;
      state.history.push({ nodeId: state.currentId, text: node.text, answer: choice });
      state.currentId = nextId;
      render();
    }

    function goBack() {
      if (!state.history.length) return;
      const prev = state.history.pop();
      state.currentId = prev.nodeId;
      render();
    }

    function restart() {
      state.currentId = state.data.design.entryNodeId;
      state.history = [];
      render();
    }

    function render() {
      const node = state.data.nodes[state.currentId];
      if (node) {
        renderQuestion(node);
        return;
      }

      const result = state.data.results[state.currentId];
      if (result) {
        els.questionText.textContent = '추천 결과를 확인하세요.';
        els.questionMeta.textContent = `답변 ${state.history.length}개를 반영했습니다.`;
        els.candidateChips.innerHTML = '';
        renderPath();
        els.answerButtons.classList.add('hidden');
        els.backBtn.disabled = state.history.length === 0;
        renderResult(state.currentId);
        return;
      }

      els.questionText.textContent = '알 수 없는 노드입니다.';
      els.questionMeta.textContent = '구성 데이터를 확인하세요.';
      els.candidateChips.innerHTML = '';
      els.answerButtons.classList.add('hidden');
      els.resultPanel.classList.add('hidden');
    }

    window.goBack = goBack;
    window.restart = restart;

    els.yesBtn.addEventListener('click', () => answer('yes'));
    els.noBtn.addEventListener('click', () => answer('no'));
    els.backBtn.addEventListener('click', goBack);
    els.restartBtn.addEventListener('click', restart);

    render();
  </script>
</body>
</html>
